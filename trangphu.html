<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trang Phụ</title>
    <style>
        body {
            background-color: #fce4ec; /* Giữ nguyên màu nền hồng nhạt */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        h1 {
            color: #f8098d; /* Giữ màu hồng đậm */
            /* TĂNG KÍCH THƯỚC CHỮ TO HƠN NỮA */
            font-size: 2.5rem; 
            font-weight: 900; /* Siêu đậm cho nổi bật */
            text-transform: uppercase;
            text-align: center;
            line-height: 1.2; /* Khoảng cách giữa các từ */
            margin: 0;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

    <h1>
        CẢM<br>
        ƠN<br>
        MỌI<br>
        NGƯỜI<br>
        ĐÃ<br>
        NGHE<br>
        NHẠC!
    </h1>

</body>
</html>
